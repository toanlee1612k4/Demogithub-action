name: Deploy Java App to Docker Hub

on:
  push:
    branches: [ "main" ] # Kích hoạt quy trình khi có code đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Tải mã nguồn về máy ảo
        uses: actions/checkout@v4

      - name: Bước 2 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Lấy tên đăng nhập từ két sắt
          password: ${{ secrets.DOCKER_PASSWORD }} # Lấy mật khẩu từ két sắt

      - name: Bước 3 - Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./LePhuocToan_3296  # Báo cho nó biết Dockerfile nằm trong thư mục này
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-java-backend:latest
      - name: Triển khai lên DevOps Classroom
        # Truyền két sắt vào làm biến môi trường cho bước này
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          set -euo pipefail
          
          # Tự động lấy ID Docker Hub ghép với tên Image, không bao giờ lo sai!
          REPO="${DOCKER_USERNAME}/my-java-backend"
          CONTAINER_PORT=8080
          
          echo "Đang gọi webhook: ${DEPLOY_URL}?repo=${REPO}&tag=latest..."

          # Thêm cơ chế retry (gọi lại 5 lần) đề phòng server trường bị lag thật
          RESPONSE=$(curl --retry 5 --retry-delay 3 --retry-all-errors -sS -w "\n%{http_code}" -X POST \
            "${DEPLOY_URL}?repo=${REPO}&tag=latest&slot=5&container_port=${CONTAINER_PORT}&strict_container_port=0")

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "❌ Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo "🎉 Deploy thành công rực rỡ!"
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
