name: Deploy Java App to Docker Hub

on:
  push:
    branches: [ "main" ] # Kích hoạt quy trình khi có code đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Tải mã nguồn về máy ảo
        uses: actions/checkout@v4

      - name: Bước 2 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Lấy tên đăng nhập từ két sắt
          password: ${{ secrets.DOCKER_PASSWORD }} # Lấy mật khẩu từ két sắt

      - name: Bước 3 - Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./LePhuocToan_3296  # Báo cho nó biết Dockerfile nằm trong thư mục này
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-java-backend:latest
