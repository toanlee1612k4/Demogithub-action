spring.application.name=LePhuocToan_3296

# Server Configuration
server.port=8080

# Database connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/ebookstore
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Spring Security
# spring.autoconfigure.exclude removed - needed for proper auth

# Browser Auto-Launch
app.browser.auto-launch=true
app.browser.url=http://localhost:8080