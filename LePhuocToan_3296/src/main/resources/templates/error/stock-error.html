<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hết hàng - JBook Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container text-center py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <i class="fas fa-box-open fa-5x text-warning mb-4"></i>
                <h3 class="mb-3">Sản phẩm tạm hết hàng!</h3>
                <p class="text-muted mb-4" th:text="${error}">Sản phẩm hiện không đủ số lượng.</p>
                <a th:href="@{/books}" class="btn btn-primary me-2">
                    <i class="fas fa-book"></i> Xem sách khác
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Quay lại
                </a>
            </div>
        </div>
    </div>
</body>
</html>
