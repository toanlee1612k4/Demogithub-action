<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/admin-layout :: admin-head('Ma giam gia - Admin')}"></head>
<body>
<nav th:replace="~{fragments/admin-layout :: admin-sidebar('coupons')}"></nav>
<div th:replace="~{fragments/admin-layout :: admin-overlay}"></div>

<div class="admin-main">
    <header th:replace="~{fragments/admin-layout :: admin-topbar('Ma giam gia')}"></header>
    <div class="admin-content">

        <nav class="admin-breadcrumb" aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a th:href="@{/admin}">Dashboard</a></li>
                <li class="breadcrumb-item active">Ma giam gia</li>
            </ol>
        </nav>

        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Add Coupon Form -->
        <div class="glass-card mb-3">
            <div class="card-header">
                <h6 class="mb-0" style="font-size:0.85rem;font-weight:600;color:var(--text-primary);">
                    <i class="fas fa-plus-circle me-2" style="color:#22c55e;"></i>Them ma giam gia
                </h6>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/coupons/add}" method="post" th:object="${newCoupon}">
                    <div class="row g-2">
                        <div class="col-md-2">
                            <label class="form-label" style="color:var(--text-secondary);font-size:0.75rem;">Ma code</label>
                            <input type="text" class="form-control form-control-sm" th:field="*{code}" required placeholder="VD: SALE20">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" style="color:var(--text-secondary);font-size:0.75rem;">Loai giam</label>
                            <select class="form-select form-select-sm" th:field="*{discountType}" required>
                                <option value="PERCENT">Phan tram (%)</option>
                                <option value="FIXED">Co dinh (VND)</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" style="color:var(--text-secondary);font-size:0.75rem;">Gia tri</label>
                            <input type="number" step="0.01" class="form-control form-control-sm" th:field="*{discountValue}" required placeholder="20">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" style="color:var(--text-secondary);font-size:0.75rem;">Don toi thieu</label>
                            <input type="number" step="0.01" class="form-control form-control-sm" th:field="*{minOrderValue}" placeholder="0">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" style="color:var(--text-secondary);font-size:0.75rem;">Giam toi da</label>
                            <input type="number" step="0.01" class="form-control form-control-sm" th:field="*{maxDiscount}" placeholder="50000">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" style="color:var(--text-secondary);font-size:0.75rem;">Luot dung</label>
                            <input type="number" class="form-control form-control-sm" th:field="*{usageLimit}" placeholder="100">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" style="color:var(--text-secondary);font-size:0.75rem;">Bat dau</label>
                            <input type="datetime-local" class="form-control form-control-sm" th:field="*{startDate}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" style="color:var(--text-secondary);font-size:0.75rem;">Ket thuc</label>
                            <input type="datetime-local" class="form-control form-control-sm" th:field="*{endDate}" required>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary btn-sm w-100" style="font-size:0.8rem;">
                                <i class="fas fa-plus me-1"></i> Them coupon
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Coupon List -->
        <div class="glass-card">
            <div class="card-header">
                <h6 class="mb-0" style="font-size:0.85rem;font-weight:600;color:var(--text-primary);">
                    <i class="fas fa-ticket-alt me-2" style="color:var(--accent);"></i>Danh sach ma giam gia
                    <span class="badge badge-glass bg-primary ms-2" th:text="${couponPage.totalElements}">0</span>
                </h6>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table admin-table mb-0">
                        <thead>
                            <tr>
                                <th>Ma</th>
                                <th>Loai</th>
                                <th>Gia tri</th>
                                <th>Don toi thieu</th>
                                <th>Da dung</th>
                                <th>Thoi gian</th>
                                <th class="text-center">Trang thai</th>
                                <th class="text-center">Thao tac</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="coupon : ${couponPage.content}">
                                <td>
                                    <code style="color:var(--accent);font-size:0.82rem;font-weight:600;" th:text="${coupon.code}">CODE</code>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${coupon.discountType.name() == 'PERCENT' ? 'bg-info' : 'bg-warning text-dark'}"
                                          th:text="${coupon.discountType.name() == 'PERCENT' ? '%' : 'VND'}">%</span>
                                </td>
                                <td th:text="${coupon.discountType.name() == 'PERCENT' ? coupon.discountValue + '%' : #numbers.formatDecimal(coupon.discountValue, 0, 'COMMA', 0, 'POINT') + 'd'}">20</td>
                                <td th:text="${coupon.minOrderValue != null ? #numbers.formatDecimal(coupon.minOrderValue, 0, 'COMMA', 0, 'POINT') + 'd' : '0d'}">0d</td>
                                <td>
                                    <span th:text="${coupon.usedCount}">0</span> / <span th:text="${coupon.usageLimit}">100</span>
                                </td>
                                <td style="font-size:0.75rem;">
                                    <div th:text="${coupon.startDate != null ? #temporals.format(coupon.startDate, 'dd/MM/yyyy') : 'N/A'}">start</div>
                                    <div style="color:var(--text-muted);" th:text="${coupon.endDate != null ? '~ ' + #temporals.format(coupon.endDate, 'dd/MM/yyyy') : ''}">end</div>
                                </td>
                                <td class="text-center">
                                    <span class="badge"
                                          th:classappend="${coupon.isActive ? 'bg-success' : 'bg-secondary'}"
                                          th:text="${coupon.isActive ? 'Hoat dong' : 'Tat'}">Active</span>
                                </td>
                                <td class="text-center">
                                    <div class="d-flex gap-1 justify-content-center">
                                        <form th:action="@{/admin/coupons/toggle/{id}(id=${coupon.id})}" method="post" style="display:inline;">
                                            <button type="submit" class="btn btn-sm"
                                                    th:classappend="${coupon.isActive ? 'btn-outline-warning' : 'btn-outline-success'}"
                                                    style="font-size:0.72rem;"
                                                    th:title="${coupon.isActive ? 'Tat' : 'Bat'}">
                                                <i th:classappend="${coupon.isActive ? 'fa-pause' : 'fa-play'}" class="fas"></i>
                                            </button>
                                        </form>
                                        <form th:action="@{/admin/coupons/delete/{id}(id=${coupon.id})}" method="post"
                                              style="display:inline;" onsubmit="return confirm('Xoa ma giam gia nay?');">
                                            <button type="submit" class="btn btn-outline-danger btn-sm" style="font-size:0.72rem;" title="Xoa">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${couponPage.content.isEmpty()}">
                                <td colspan="8" class="text-center py-4" style="color:var(--text-muted);">
                                    <i class="fas fa-ticket-alt fa-2x mb-2 d-block" style="opacity:0.3;"></i>
                                    Chua co ma giam gia nao
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${couponPage.totalPages > 1}" class="d-flex justify-content-center mt-3">
            <ul class="pagination pagination-sm">
                <li class="page-item" th:classappend="${couponPage.number == 0 ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/coupons(page=${couponPage.number - 1})}"><i class="fas fa-chevron-left"></i></a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, couponPage.totalPages - 1)}"
                    class="page-item" th:classappend="${i == couponPage.number ? 'active' : ''}">
                    <a class="page-link" th:href="@{/admin/coupons(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${couponPage.number == couponPage.totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/admin/coupons(page=${couponPage.number + 1})}"><i class="fas fa-chevron-right"></i></a>
                </li>
            </ul>
        </nav>

    </div>
</div>

<th:block th:replace="~{fragments/admin-layout :: admin-scripts}"></th:block>
</body>
</html>
