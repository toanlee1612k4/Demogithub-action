<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Sách - Admin')}"></head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Sidebar -->
<nav th:replace="~{admin/dashboard :: .sidebar}"></nav>

<!-- Main Content -->
<main class="main-content">
    <div class="container-fluid">
        
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-book"></i> Quản lý Sách</h2>
            <div>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addBookModal">
                    <i class="fas fa-plus"></i> Thêm sách mới
                </button>
                <button class="btn btn-outline-secondary" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>
        
        <!-- Alert Messages -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <!-- Filters & Search -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/admin/books}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Tìm kiếm</label>
                        <input type="text" 
                               class="form-control" 
                               name="keyword" 
                               th:value="${keyword}"
                               placeholder="Tên sách, tác giả...">
                    </div>
                    
                    <div class="col-md-3">
                        <label class="form-label">Danh mục</label>
                        <select class="form-select" name="category">
                            <option value="">Tất cả danh mục</option>
                            <option th:each="cat : ${categories}" 
                                    th:value="${cat.id}" 
                                    th:text="${cat.name}"
                                    th:selected="${category == cat.id}">
                                Danh mục
                            </option>
                        </select>
                    </div>
                    
                    <div class="col-md-2">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-select" name="status">
                            <option value="">Tất cả</option>
                            <option value="in-stock" th:selected="${status == 'in-stock'}">Còn hàng</option>
                            <option value="low-stock" th:selected="${status == 'low-stock'}">Sắp hết</option>
                            <option value="out-of-stock" th:selected="${status == 'out-of-stock'}">Hết hàng</option>
                        </select>
                    </div>
                    
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="fas fa-search"></i> Tìm kiếm
                        </button>
                        <a th:href="@{/admin/books}" class="btn btn-outline-secondary">
                            <i class="fas fa-redo"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Books Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th style="width: 100px;">Ảnh</th>
                                <th>Tên sách</th>
                                <th>Tác giả</th>
                                <th>Danh mục</th>
                                <th>Giá</th>
                                <th style="width: 100px;">Số lượng</th>
                                <th>Trạng thái</th>
                                <th style="width: 150px;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="book : ${books}">
                                <td><strong th:text="${book.id}">1</strong></td>
                                <td>
                                    <img th:src="${book.image != null ? book.image : 'https://via.placeholder.com/60x80'}" 
                                         class="img-thumbnail" 
                                         th:alt="${book.title}"
                                         style="width: 60px; height: 80px; object-fit: cover;">
                                </td>
                                <td>
                                    <strong th:text="${book.title}">Tên sách</strong>
                                    <br>
                                    <small class="text-muted">ISBN: <span th:text="${book.isbn}">123456789</span></small>
                                </td>
                                <td th:text="${book.author}">Tác giả</td>
                                <td>
                                    <span class="badge bg-info" th:text="${book.category?.name}">Danh mục</span>
                                </td>
                                <td>
                                    <strong class="text-danger" 
                                            th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT') + '₫'}">
                                        150,000₫
                                    </strong>
                                </td>
                                <td class="text-center">
                                    <span class="badge" 
                                          th:classappend="${book.quantity > 10 ? 'bg-success' : (book.quantity > 0 ? 'bg-warning' : 'bg-danger')}"
                                          th:text="${book.quantity}">
                                        10
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${book.quantity > 10}" class="badge bg-success">
                                        <i class="fas fa-check"></i> Còn hàng
                                    </span>
                                    <span th:if="${book.quantity > 0 && book.quantity <= 10}" class="badge bg-warning">
                                        <i class="fas fa-exclamation-triangle"></i> Sắp hết
                                    </span>
                                    <span th:if="${book.quantity <= 0}" class="badge bg-danger">
                                        <i class="fas fa-times"></i> Hết hàng
                                    </span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <button type="button" 
                                                class="btn btn-outline-primary"
                                                th:attr="data-book-id=${book.id}"
                                                onclick="viewBook(this)"
                                                title="Xem chi tiết">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                        <button type="button" 
                                                class="btn btn-outline-warning"
                                                th:attr="data-book-id=${book.id}"
                                                onclick="editBook(this)"
                                                title="Sửa">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button type="button" 
                                                class="btn btn-outline-danger"
                                                th:attr="data-book-id=${book.id}, data-book-title=${book.title}"
                                                onclick="deleteBook(this)"
                                                title="Xóa">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Empty State -->
                <div th:if="${books == null || #lists.isEmpty(books)}" class="text-center py-5">
                    <i class="fas fa-book fa-4x text-muted mb-3"></i>
                    <h5>Không tìm thấy sách nào</h5>
                </div>
                
                <!-- Pagination -->
                <nav th:if="${totalPages > 1}" class="mt-4" aria-label="Page navigation">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/books(page=${currentPage - 1}, keyword=${keyword}, category=${category}, status=${status})}">
                                <i class="fas fa-chevron-left"></i>
                            </a>
                        </li>
                        
                        <li class="page-item" 
                            th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${pageNum == currentPage} ? 'active'">
                            <a class="page-link" 
                               th:href="@{/admin/books(page=${pageNum}, keyword=${keyword}, category=${category}, status=${status})}" 
                               th:text="${pageNum + 1}">1</a>
                        </li>
                        
                        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/books(page=${currentPage + 1}, keyword=${keyword}, category=${category}, status=${status})}">
                                <i class="fas fa-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        
    </div>
</main>

<!-- Add/Edit Book Modal -->
<div class="modal fade" id="addBookModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-plus"></i> Thêm sách mới
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/books/save}" th:object="${book}" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Tên sách <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">ISBN</label>
                            <input type="text" class="form-control" th:field="*{isbn}">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Tác giả <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{author}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Nhà xuất bản</label>
                            <input type="text" class="form-control" th:field="*{publisher}">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Danh mục <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{category.id}" required>
                                <option value="">Chọn danh mục</option>
                                <option th:each="cat : ${categories}" 
                                        th:value="${cat.id}" 
                                        th:text="${cat.name}">
                                    Danh mục
                                </option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Giá (VNĐ) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{price}" min="0" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Số lượng <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{quantity}" min="0" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Năm xuất bản</label>
                            <input type="number" class="form-control" th:field="*{publishYear}" min="1900" max="2100">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Số trang</label>
                            <input type="number" class="form-control" th:field="*{pages}" min="1">
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Ảnh bìa</label>
                            <input type="file" class="form-control" name="imageFile" accept="image/*">
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Lưu
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Scripts -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<!-- Page Specific Scripts -->
<script>
    function viewBook(button) {
        const bookId = button.getAttribute('data-book-id');
        window.open('/books/' + bookId, '_blank');
    }
    
    function editBook(button) {
        const bookId = button.getAttribute('data-book-id');
        window.location.href = '/admin/books/' + bookId + '/edit';
    }
    
    function deleteBook(button) {
        const bookId = button.getAttribute('data-book-id');
        const bookTitle = button.getAttribute('data-book-title');
        
        if (confirm(`Bạn có chắc muốn xóa sách "${bookTitle}"?`)) {
            fetch('/admin/books/' + bookId, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast('Đã xóa sách thành công!', 'success');
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                } else {
                    showToast(data.message || 'Có lỗi xảy ra!', 'danger');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('Có lỗi xảy ra!', 'danger');
            });
        }
    }
</script>

</body>
</html>
