<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/admin-layout :: admin-head('Nguoi dung - Admin')}"></head>
<body>
<nav th:replace="~{fragments/admin-layout :: admin-sidebar('users')}"></nav>
<div th:replace="~{fragments/admin-layout :: admin-overlay}"></div>

<div class="admin-main">
    <header th:replace="~{fragments/admin-layout :: admin-topbar('Nguoi dung')}"></header>
    <div class="admin-content">

        <nav class="admin-breadcrumb" aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a th:href="@{/admin}">Dashboard</a></li>
                <li class="breadcrumb-item"><a th:href="@{/admin/users}">Nguoi dung</a></li>
                <li class="breadcrumb-item active" th:text="${user.id != null ? 'Chinh sua' : 'Them moi'}">Form</li>
            </ol>
        </nav>

        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card">
                    <div class="card-header">
                        <h6 class="mb-0" style="font-size:0.85rem;font-weight:600;color:var(--text-primary);">
                            <i class="fas fa-user-edit me-2" style="color:var(--accent);"></i>
                            <span th:text="${user.id != null ? 'Chinh sua nguoi dung' : 'Them nguoi dung moi'}">Form title</span>
                        </h6>
                    </div>
                    <div class="card-body">
                        <form th:action="${user.id != null ? '/admin/users/edit/' + user.id : '/admin/users/add'}" method="post">

                            <div class="row g-3">
                                <!-- Username -->
                                <div class="col-md-6">
                                    <label class="form-label" style="color:var(--text-secondary);font-size:0.8rem;font-weight:500;">
                                        <i class="fas fa-user me-1"></i> Ten dang nhap
                                    </label>
                                    <input type="text" class="form-control" th:field="*{user.username}"
                                           th:readonly="${user.id != null}" required placeholder="username">
                                </div>

                                <!-- Fullname -->
                                <div class="col-md-6">
                                    <label class="form-label" style="color:var(--text-secondary);font-size:0.8rem;font-weight:500;">
                                        <i class="fas fa-id-card me-1"></i> Ho va ten
                                    </label>
                                    <input type="text" class="form-control" th:field="*{user.fullname}" required placeholder="Ho va ten">
                                </div>

                                <!-- Email -->
                                <div class="col-md-6">
                                    <label class="form-label" style="color:var(--text-secondary);font-size:0.8rem;font-weight:500;">
                                        <i class="fas fa-envelope me-1"></i> Email
                                    </label>
                                    <input type="email" class="form-control" th:field="*{user.email}" required placeholder="email@example.com">
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6">
                                    <label class="form-label" style="color:var(--text-secondary);font-size:0.8rem;font-weight:500;">
                                        <i class="fas fa-phone me-1"></i> So dien thoai
                                    </label>
                                    <input type="text" class="form-control" th:field="*{user.phoneNumber}" placeholder="0123456789">
                                </div>

                                <!-- Password (only for new user or change) -->
                                <div class="col-md-6" th:if="${user.id == null}">
                                    <label class="form-label" style="color:var(--text-secondary);font-size:0.8rem;font-weight:500;">
                                        <i class="fas fa-lock me-1"></i> Mat khau
                                    </label>
                                    <input type="password" class="form-control" th:field="*{user.password}" required placeholder="Mat khau">
                                </div>

                                <div class="col-md-6" th:if="${user.id != null}">
                                    <label class="form-label" style="color:var(--text-secondary);font-size:0.8rem;font-weight:500;">
                                        <i class="fas fa-lock me-1"></i> Mat khau moi (de trong neu khong doi)
                                    </label>
                                    <input type="password" class="form-control" name="newPassword" placeholder="De trong neu khong doi">
                                </div>

                                <!-- Roles -->
                                <div class="col-12">
                                    <label class="form-label" style="color:var(--text-secondary);font-size:0.8rem;font-weight:500;">
                                        <i class="fas fa-shield-alt me-1"></i> Vai tro
                                    </label>
                                    <div class="d-flex flex-wrap gap-3">
                                        <div th:each="role : ${allRoles}" class="form-check">
                                            <input type="checkbox" class="form-check-input"
                                                   th:id="${'role_' + role.id}"
                                                   name="roleIds"
                                                   th:value="${role.id}"
                                                   th:checked="${user.roles != null and user.roles.contains(role)}">
                                            <label class="form-check-label" th:for="${'role_' + role.id}"
                                                   style="color:var(--text-secondary);font-size:0.82rem;">
                                                <span class="badge me-1"
                                                      th:classappend="${role.name == 'ROLE_ADMIN' ? 'bg-danger' : 'bg-info'}"
                                                      th:text="${role.name}">Role</span>
                                                <small th:text="${role.description}" style="color:var(--text-muted);"></small>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary" style="font-size:0.82rem;">
                                    <i class="fas fa-save me-1"></i>
                                    <span th:text="${user.id != null ? 'Cap nhat' : 'Them moi'}">Save</span>
                                </button>
                                <a th:href="@{/admin/users}" class="btn btn-outline-secondary" style="color:var(--text-secondary);border-color:var(--glass-border);font-size:0.82rem;">
                                    <i class="fas fa-times me-1"></i> Huy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<th:block th:replace="~{fragments/admin-layout :: admin-scripts}"></th:block>
</body>
</html>
