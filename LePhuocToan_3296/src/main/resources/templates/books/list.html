<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Danh sách sách - JBook Store')}"></head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Main Content -->
<main class="main-content">
    <div class="container">
        
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                <li class="breadcrumb-item active">Danh sách sách</li>
            </ol>
        </nav>
        
        <h2 class="mb-4"><i class="fas fa-book"></i> Danh sách sách</h2>
        
        <!-- Filters -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/books}" method="get" class="row g-3" id="filterForm">
                    <!-- Search -->
                    <div class="col-md-4">
                        <label class="form-label">Tìm kiếm</label>
                        <input type="text" 
                               class="form-control" 
                               name="keyword" 
                               th:value="${keyword}"
                               placeholder="Tên sách, tác giả...">
                    </div>
                    
                    <!-- Category -->
                    <div class="col-md-3">
                        <label class="form-label">Danh mục</label>
                        <select class="form-select" name="categoryId">
                            <option value="">Tất cả danh mục</option>
                            <option th:each="cat : ${categories}" 
                                    th:value="${cat.id}" 
                                    th:text="${cat.name}"
                                    th:selected="${categoryId != null && categoryId == cat.id}">
                                Danh mục
                            </option>
                        </select>
                    </div>
                    
                    <!-- Sort -->
                    <div class="col-md-2">
                        <label class="form-label">Sắp xếp theo</label>
                        <select class="form-select" name="sortBy">
                            <option value="title" th:selected="${sortBy == 'title'}">Tên sách</option>
                            <option value="price" th:selected="${sortBy == 'price'}">Giá</option>
                            <option value="createdDate" th:selected="${sortBy == 'createdDate'}">Mới nhất</option>
                        </select>
                    </div>
                    
                    <!-- Direction -->
                    <div class="col-md-1">
                        <label class="form-label">Thứ tự</label>
                        <select class="form-select" name="sortDir">
                            <option value="asc" th:selected="${sortDir == 'asc'}">↑</option>
                            <option value="desc" th:selected="${sortDir == 'desc'}">↓</option>
                        </select>
                    </div>
                    
                    <!-- Buttons -->
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="fas fa-search"></i>
                        </button>
                        <a th:href="@{/books}" class="btn btn-outline-secondary">
                            <i class="fas fa-redo"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Books Grid -->
        <div class="row g-4 mb-4">
            <div class="col-6 col-md-4 col-lg-3" th:each="book : ${bookPage.content}">
                <div class="card book-card h-100" th:classappend="${book.quantity <= 0} ? 'out-of-stock' : ''">
                    <div class="position-relative">
                        <img th:src="${book.image != null ? book.image : 'https://via.placeholder.com/300x400'}" 
                             class="card-img-top" 
                             th:alt="${book.title}">
                        
                        <span th:if="${book.quantity <= 0}" class="position-absolute top-0 end-0 m-2 badge bg-danger">
                            Hết hàng
                        </span>
                    </div>
                    
                    <div class="card-body">
                        <h6 class="card-title text-truncate" th:text="${book.title}">Tên sách</h6>
                        <p class="card-text text-muted small text-truncate" th:text="${book.author}">Tác giả</p>
                        
                        <div class="price mb-2" 
                             th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT') + '₫'}">
                            150,000₫
                        </div>
                        
                        <div class="d-grid gap-2">
                            <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-outline-primary btn-sm">
                                <i class="fas fa-info-circle"></i> Chi tiết
                            </a>
                            <form th:action="@{/cart/add}" method="post" class="m-0" sec:authorize="isAuthenticated()">
                                <input type="hidden" name="bookId" th:value="${book.id}">
                                <input type="hidden" name="quantity" value="1">
                                <button type="submit" 
                                        class="btn btn-primary btn-sm w-100"
                                        th:disabled="${book.quantity <= 0}">
                                    <i class="fas fa-cart-plus"></i> Thêm vào giỏ
                                </button>
                            </form>
                            <a sec:authorize="!isAuthenticated()" 
                               th:href="@{/login}" 
                               class="btn btn-primary btn-sm">
                                <i class="fas fa-cart-plus"></i> Thêm vào giỏ
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Empty State -->
        <div th:if="${bookPage.content == null || #lists.isEmpty(bookPage.content)}" class="text-center py-5">
            <i class="fas fa-book-open fa-4x text-muted mb-3"></i>
            <h4>Không tìm thấy sách nào</h4>
            <p class="text-muted">Vui lòng thử tìm kiếm khác</p>
        </div>
        
        <!-- Pagination -->
        <nav th:if="${bookPage.totalPages > 1}" aria-label="Page navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" 
                       th:href="@{/books(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy}, sortDir=${sortDir})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                
                <li class="page-item" 
                    th:each="pageNum : ${#numbers.sequence(0, bookPage.totalPages - 1)}"
                    th:classappend="${pageNum == currentPage} ? 'active'">
                    <a class="page-link" 
                       th:href="@{/books(page=${pageNum}, keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy}, sortDir=${sortDir})}" 
                       th:text="${pageNum + 1}">1</a>
                </li>
                
                <li class="page-item" th:classappend="${currentPage + 1 >= bookPage.totalPages} ? 'disabled'">
                    <a class="page-link" 
                       th:href="@{/books(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, sortBy=${sortBy}, sortDir=${sortDir})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
        
    </div>
</main>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- Scripts -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
