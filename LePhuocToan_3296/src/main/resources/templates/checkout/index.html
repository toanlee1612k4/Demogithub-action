<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Thanh toán - JBook Store')}"></head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Main Content -->
<main class="main-content">
    <div class="container">
        
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                <li class="breadcrumb-item"><a th:href="@{/cart}">Giỏ hàng</a></li>
                <li class="breadcrumb-item active">Thanh toán</li>
            </ol>
        </nav>
        
        <h2 class="mb-4"><i class="fas fa-credit-card"></i> Thanh toán đơn hàng</h2>
        
        <!-- Alert Messages -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <!-- Checkout Form -->
        <form th:action="@{/checkout/process}" th:object="${request}" method="post" class="needs-validation" novalidate>
            
            <div class="row">
                
                <!-- Shipping Information -->
                <div class="col-lg-7 mb-4">
                    
                    <!-- Customer Info -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0"><i class="fas fa-user"></i> Thông tin người nhận</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="phoneNumber" class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                    <input type="tel" 
                                           class="form-control" 
                                           id="phoneNumber" 
                                           th:field="*{phoneNumber}"
                                           required>
                                </div>
                                
                                <div class="col-12">
                                    <label for="shippingAddress" class="form-label">Địa chỉ giao hàng <span class="text-danger">*</span></label>
                                    <textarea class="form-control" 
                                              id="shippingAddress" 
                                              th:field="*{shippingAddress}"
                                              rows="3"
                                              required></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Payment Method -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-success text-white">
                            <h5 class="mb-0"><i class="fas fa-money-bill-wave"></i> Phương thức thanh toán</h5>
                        </div>
                        <div class="card-body">
                            <div class="form-check mb-3">
                                <input class="form-check-input" 
                                       type="radio" 
                                       name="paymentMethod" 
                                       id="cod" 
                                       value="COD"
                                       th:field="*{paymentMethod}"
                                       checked>
                                <label class="form-check-label" for="cod">
                                    <i class="fas fa-money-bill-wave text-success"></i>
                                    <strong>Thanh toán khi nhận hàng (COD)</strong>
                                </label>
                            </div>
                            
                            <div class="form-check">
                                <input class="form-check-input" 
                                       type="radio" 
                                       name="paymentMethod" 
                                       id="banking" 
                                       value="BANKING"
                                       th:field="*{paymentMethod}">
                                <label class="form-check-label" for="banking">
                                    <i class="fas fa-university text-primary"></i>
                                    <strong>Chuyển khoản ngân hàng</strong>
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Notes -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-warning">
                            <h5 class="mb-0"><i class="fas fa-sticky-note"></i> Ghi chú đơn hàng</h5>
                        </div>
                        <div class="card-body">
                            <textarea class="form-control" 
                                      th:field="*{note}"
                                      rows="3" 
                                      placeholder="Ghi chú về đơn hàng (không bắt buộc)"></textarea>
                        </div>
                    </div>
                    
                </div>
                
                <!-- Order Summary -->
                <div class="col-lg-5">
                    <div class="card border-0 shadow-sm sticky-top" style="top: 100px;">
                        <div class="card-header bg-danger text-white">
                            <h5 class="mb-0"><i class="fas fa-shopping-bag"></i> Đơn hàng của bạn</h5>
                        </div>
                        <div class="card-body">
                            
                            <!-- Cart Items -->
                            <div class="mb-3" style="max-height: 300px; overflow-y: auto;">
                                <div class="d-flex align-items-center mb-3 pb-3 border-bottom" 
                                     th:each="item : ${cartItems}">
                                    <img th:src="${item.book.image != null ? item.book.image : 'https://via.placeholder.com/60x80'}" 
                                         class="rounded me-3" 
                                         th:alt="${item.book.title}"
                                         style="width: 60px; height: 80px; object-fit: cover;">
                                    <div class="flex-grow-1">
                                        <h6 class="mb-1 small" th:text="${item.book.title}">Tên sách</h6>
                                        <p class="mb-0 text-muted small">
                                            <span th:text="${item.quantity}">2</span> x 
                                            <span th:text="${#numbers.formatDecimal(item.book.price, 0, 'COMMA', 0, 'POINT') + '₫'}">150,000₫</span>
                                        </p>
                                    </div>
                                    <strong class="text-danger" 
                                            th:text="${#numbers.formatDecimal(item.book.price * item.quantity, 0, 'COMMA', 0, 'POINT') + '₫'}">
                                        300,000₫
                                    </strong>
                                </div>
                            </div>
                            
                            <!-- Order Calculations -->
                            <div class="border-top pt-3">
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Tạm tính:</span>
                                    <strong th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + '₫'}">
                                        450,000₫
                                    </strong>
                                </div>
                                
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Phí vận chuyển:</span>
                                    <strong th:text="${total >= 200000 ? 'Miễn phí' : '30,000₫'}">
                                        Miễn phí
                                    </strong>
                                </div>
                                
                                <hr>
                                
                                <div class="d-flex justify-content-between mb-3">
                                    <h5>Tổng cộng:</h5>
                                    <h4 class="text-danger mb-0">
                                        <span th:text="${#numbers.formatDecimal(total >= 200000 ? total : total + 30000, 0, 'COMMA', 0, 'POINT') + '₫'}">
                                            480,000₫
                                        </span>
                                    </h4>
                                </div>
                                
                                <!-- Submit Button -->
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-danger btn-lg">
                                        <i class="fas fa-check-circle"></i> Đặt hàng
                                    </button>
                                    <a th:href="@{/cart}" class="btn btn-outline-secondary">
                                        <i class="fas fa-arrow-left"></i> Quay lại giỏ hàng
                                    </a>
                                </div>
                                
                                <!-- Security Badges -->
                                <div class="text-center mt-3">
                                    <small class="text-muted">
                                        <i class="fas fa-lock"></i> Thanh toán an toàn & bảo mật
                                    </small>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
                
            </div>
            
        </form>
        
    </div>
</main>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- Scripts -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>
    // Bootstrap form validation
    (function () {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>

</body>
</html>
