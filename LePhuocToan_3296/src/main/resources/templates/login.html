<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng nhập - JBook Store')}"></head>
<body class="bg-light">

<style>
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    .login-card {
        max-width: 450px;
        width: 100%;
    }
    
    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 20px 0;
    }
    
    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #dee2e6;
    }
    
    .divider span {
        padding: 0 10px;
        color: #6c757d;
        font-size: 0.9rem;
    }
</style>

<div class="login-container">
    <div class="login-card">
        
        <!-- Logo & Title -->
        <div class="text-center mb-4">
            <a th:href="@{/}" class="text-decoration-none">
                <h1 class="text-primary mb-2">
                    <i class="fas fa-book-open"></i> JBook Store
                </h1>
            </a>
            <p class="text-muted">Đăng nhập để tiếp tục</p>
        </div>
        
        <!-- Login Card -->
        <div class="card border-0 shadow-lg">
            <div class="card-body p-4">
                
                <!-- Alert Messages -->
                <div th:if="${param.error}" class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i> 
                    Tên đăng nhập hoặc mật khẩu không đúng!
                </div>
                
                <div th:if="${param.logout}" class="alert alert-success">
                    <i class="fas fa-check-circle"></i> 
                    Bạn đã đăng xuất thành công!
                </div>
                
                <div th:if="${message}" class="alert alert-info">
                    <i class="fas fa-info-circle"></i> 
                    <span th:text="${message}"></span>
                </div>
                
                <!-- Login Form -->
                <form th:action="@{/login}" method="post">
                    
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Tên đăng nhập
                        </label>
                        <input type="text" 
                               class="form-control form-control-lg" 
                               id="username" 
                               name="username"
                               placeholder="Nhập tên đăng nhập"
                               required 
                               autofocus>
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Mật khẩu
                        </label>
                        <div class="input-group">
                            <input type="password" 
                                   class="form-control form-control-lg" 
                                   id="password" 
                                   name="password"
                                   placeholder="Nhập mật khẩu"
                                   required>
                            <button class="btn btn-outline-secondary" 
                                    type="button" 
                                    onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Remember Me & Forgot Password -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" 
                                   type="checkbox" 
                                   id="remember-me" 
                                   name="remember-me">
                            <label class="form-check-label" for="remember-me">
                                Ghi nhớ đăng nhập
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none small">Quên mật khẩu?</a>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Đăng nhập
                        </button>
                    </div>
                    
                    <!-- Divider -->
                    <div class="divider">
                        <span>Hoặc đăng nhập với</span>
                    </div>
                    
                    <!-- Social Login (Optional) -->
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <button type="button" class="btn btn-outline-danger w-100">
                                <i class="fab fa-google"></i> Google
                            </button>
                        </div>
                        <div class="col-6">
                            <button type="button" class="btn btn-outline-primary w-100">
                                <i class="fab fa-facebook"></i> Facebook
                            </button>
                        </div>
                    </div>
                    
                </form>
                
                <!-- Register Link -->
                <div class="text-center">
                    <p class="mb-0">
                        Chưa có tài khoản? 
                        <a th:href="@{/register}" class="text-decoration-none fw-bold">
                            Đăng ký ngay
                        </a>
                    </p>
                </div>
                
            </div>
        </div>
        
        <!-- Back to Home -->
        <div class="text-center mt-3">
            <a th:href="@{/}" class="text-decoration-none">
                <i class="fas fa-arrow-left"></i> Quay lại trang chủ
            </a>
        </div>
        
    </div>
</div>

<!-- Scripts -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
</script>

</body>
</html>
