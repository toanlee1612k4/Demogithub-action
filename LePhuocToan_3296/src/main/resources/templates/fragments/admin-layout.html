<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Admin Head Fragment -->
<head th:fragment="admin-head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">JBook Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-w: 260px;
            --topbar-h: 0px;
            --glass-bg: rgba(15, 23, 42, 0.78);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            --accent: #3b82f6;
            --accent-light: rgba(59, 130, 246, 0.15);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.35);
            --hover-bg: rgba(255, 255, 255, 0.06);
            --active-gradient: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* ===== GLASSMORPHISM SIDEBAR ===== */
        .admin-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-w);
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-right: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 1040;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Brand */
        .sidebar-brand {
            padding: 1.25rem 1.25rem 1rem;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .sidebar-brand a {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
            color: var(--text-primary);
        }
        .sidebar-brand .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--active-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #fff;
            flex-shrink: 0;
        }
        .sidebar-brand .brand-text {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .sidebar-brand .brand-sub {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Nav sections */
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0.75rem 0;
        }
        .sidebar-nav::-webkit-scrollbar { width: 3px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .nav-section {
            margin-bottom: 0.25rem;
        }
        .nav-section-label {
            padding: 0.5rem 1.25rem 0.35rem;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            user-select: none;
        }

        /* Nav items */
        .sidebar-nav .nav-item {
            padding: 0 0.625rem;
            margin-bottom: 2px;
        }
        .sidebar-nav .nav-link {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.55rem 0.75rem;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 450;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .sidebar-nav .nav-link i {
            width: 18px;
            text-align: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .sidebar-nav .nav-link:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        /* Active state with left gradient bar */
        .sidebar-nav .nav-link.active {
            background: var(--accent-light);
            color: #fff;
            font-weight: 550;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
        }
        .sidebar-nav .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            bottom: 15%;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--active-gradient);
        }

        /* Sidebar footer */
        .sidebar-footer {
            flex-shrink: 0;
            border-top: 1px solid var(--glass-border);
            padding: 0.625rem;
        }
        .sidebar-footer .nav-link {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.55rem 0.75rem;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 450;
            transition: all 0.2s ease;
        }
        .sidebar-footer .nav-link:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }
        .sidebar-footer .nav-link i {
            width: 18px;
            text-align: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .sidebar-footer .btn-logout {
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }
        .sidebar-footer .btn-logout:hover {
            color: #f87171 !important;
        }

        /* ===== MAIN CONTENT ===== */
        .admin-main {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            background: #0f172a;
            position: relative;
        }

        /* Topbar */
        .admin-topbar {
            position: sticky;
            top: 0;
            z-index: 1020;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .topbar-actions .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--hover-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            transition: all 0.2s;
            cursor: pointer;
        }
        .topbar-actions .btn-icon:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        .topbar-user {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.75rem 0.3rem 0.35rem;
            border-radius: 20px;
            background: var(--hover-bg);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .topbar-user:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        .topbar-user .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--active-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #fff;
            font-weight: 600;
        }
        .topbar-user span {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .admin-content {
            padding: 1.5rem;
        }

        /* ===== GLASS CARDS ===== */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .glass-card .card-header {
            background: transparent;
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 1.25rem;
        }
        .glass-card .card-body {
            padding: 1.25rem;
        }

        /* Stat cards */
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            border-radius: 3px 0 0 3px;
        }
        .stat-card.stat-blue::before { background: linear-gradient(180deg, #3b82f6, #2563eb); }
        .stat-card.stat-green::before { background: linear-gradient(180deg, #22c55e, #16a34a); }
        .stat-card.stat-yellow::before { background: linear-gradient(180deg, #eab308, #ca8a04); }
        .stat-card.stat-red::before { background: linear-gradient(180deg, #ef4444, #dc2626); }

        /* Tables */
        .admin-table {
            color: #e2e8f0;
        }
        .admin-table thead th {
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 0.75rem 1rem;
        }
        .admin-table tbody td {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding: 0.75rem 1rem;
            font-size: 0.82rem;
            vertical-align: middle;
        }
        .admin-table tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }

        /* Badges */
        .badge-glass {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.35em 0.7em;
            border-radius: 6px;
        }

        /* Buttons override */
        .btn-glass {
            background: var(--hover-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 0.4rem 0.85rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-glass:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: rgba(255,255,255,0.15);
        }

        /* Mobile menu toggle */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 0.75rem;
            left: 0.75rem;
            z-index: 1050;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1035;
        }

        /* Breadcrumb */
        .admin-breadcrumb {
            background: transparent;
            padding: 0;
            margin-bottom: 1.25rem;
            font-size: 0.78rem;
        }
        .admin-breadcrumb .breadcrumb-item a {
            color: var(--text-muted);
            text-decoration: none;
        }
        .admin-breadcrumb .breadcrumb-item a:hover {
            color: var(--accent);
        }
        .admin-breadcrumb .breadcrumb-item.active {
            color: var(--text-secondary);
        }
        .admin-breadcrumb .breadcrumb-item + .breadcrumb-item::before {
            color: var(--text-muted);
        }

        /* Form controls dark */
        .form-control, .form-select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--glass-border);
            color: #e2e8f0;
            font-size: 0.82rem;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(30, 41, 59, 0.95);
            border-color: var(--accent);
            color: #e2e8f0;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-control::placeholder { color: var(--text-muted); }
        .form-label { color: var(--text-secondary); font-size: 0.78rem; font-weight: 500; }

        /* Pagination */
        .page-link {
            background: rgba(30, 41, 59, 0.6);
            border-color: var(--glass-border);
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        .page-link:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent);
            color: #fff;
        }
        .page-item.active .page-link {
            background: var(--active-gradient);
            border-color: transparent;
        }
        .page-item.disabled .page-link {
            background: rgba(30, 41, 59, 0.3);
            color: var(--text-muted);
        }

        /* Alerts */
        .alert {
            border: none;
            border-radius: 10px;
            font-size: 0.82rem;
        }

        /* Responsive */
        @media (max-width: 991.98px) {
            .admin-sidebar {
                transform: translateX(-100%);
            }
            .admin-sidebar.show {
                transform: translateX(0);
            }
            .sidebar-toggle {
                display: flex;
            }
            .sidebar-overlay.show {
                display: block;
            }
            .admin-main {
                margin-left: 0;
            }
            .admin-topbar {
                padding-left: 3.5rem;
            }
        }
    </style>
</head>

<body>

<!-- Admin Sidebar Fragment -->
<nav th:fragment="admin-sidebar(activePage)" class="admin-sidebar" id="adminSidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
        <a th:href="@{/admin}">
            <div class="brand-icon">
                <i class="fas fa-book-open"></i>
            </div>
            <div>
                <div class="brand-text">JBook Store</div>
                <div class="brand-sub">Admin Panel</div>
            </div>
        </a>
    </div>

    <!-- Navigation -->
    <div class="sidebar-nav">
        <!-- Main -->
        <div class="nav-section">
            <div class="nav-section-label">Trang chinh</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}" th:href="@{/admin}">
                        <i class="fas fa-chart-pie"></i> Dashboard
                    </a>
                </li>
            </ul>
        </div>

        <!-- Management -->
        <div class="nav-section">
            <div class="nav-section-label">Quan ly</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'books' ? 'active' : ''}" th:href="@{/admin/books}">
                        <i class="fas fa-book"></i> Quan ly Sach
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'categories' ? 'active' : ''}" th:href="@{/admin/categories}">
                        <i class="fas fa-th-large"></i> Danh muc
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'orders' ? 'active' : ''}" th:href="@{/admin/orders}">
                        <i class="fas fa-shopping-bag"></i> Quan ly Don hang
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'users' ? 'active' : ''}" th:href="@{/admin/users}">
                        <i class="fas fa-users"></i> Khach hang
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'coupons' ? 'active' : ''}" th:href="@{/admin/coupons}">
                        <i class="fas fa-ticket-alt"></i> Ma giam gia
                    </a>
                </li>
            </ul>
        </div>

        <!-- System -->
        <div class="nav-section">
            <div class="nav-section-label">He thong</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'audit-logs' ? 'active' : ''}" th:href="@{/admin/audit-logs}">
                        <i class="fas fa-history"></i> Audit Log
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
        <a class="nav-link" th:href="@{/}">
            <i class="fas fa-home"></i> Ve trang chu
        </a>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="nav-link btn-logout">
                <i class="fas fa-sign-out-alt"></i> Dang xuat
            </button>
        </form>
    </div>
</nav>

<!-- Admin Topbar Fragment -->
<header th:fragment="admin-topbar(pageTitle)" class="admin-topbar">
    <button class="sidebar-toggle" onclick="document.getElementById('adminSidebar').classList.toggle('show');document.getElementById('sidebarOverlay').classList.toggle('show');">
        <i class="fas fa-bars"></i>
    </button>
    <div class="topbar-title" th:text="${pageTitle}">Dashboard</div>
    <div class="topbar-actions">
        <button class="btn-icon" onclick="location.reload()" title="Lam moi">
            <i class="fas fa-sync-alt"></i>
        </button>
        <a class="topbar-user" href="#" sec:authorize="isAuthenticated()">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <span sec:authentication="name">Admin</span>
        </a>
    </div>
</header>

<!-- Overlay Fragment -->
<div th:fragment="admin-overlay" class="sidebar-overlay" id="sidebarOverlay" 
     onclick="document.getElementById('adminSidebar').classList.remove('show');this.classList.remove('show');"></div>

<!-- Admin Scripts Fragment -->
<th:block th:fragment="admin-scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }
    </script>
</th:block>

</body>
</html>
